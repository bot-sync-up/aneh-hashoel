version: '3.9'

networks:
  aneh-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:

services:
  # ─────────────────────────────────────────
  #  PostgreSQL 16
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aneh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-aneh_hashoel}
      POSTGRES_USER: ${DB_USER:-aneh_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aneh-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aneh_user} -d ${DB_NAME:-aneh_hashoel}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────
  #  Redis 7
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aneh-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aneh-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────
  #  Backend — Node.js / Express (port 3001)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: aneh-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "3001:3001"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - aneh-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────
  #  Frontend — React + Nginx (port 80)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3001}
    container_name: aneh-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - aneh-net
    depends_on:
      - backend
