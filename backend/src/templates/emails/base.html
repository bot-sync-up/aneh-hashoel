<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>{{TITLE}}</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap');

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background-color: #f0f2f7;
      font-family: 'Heebo', Arial, sans-serif;
      direction: rtl;
      text-align: right;
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }

    table {
      border-collapse: collapse;
      mso-table-lspace: 0pt;
      mso-table-rspace: 0pt;
    }

    img {
      border: 0;
      height: auto;
      line-height: 100%;
      outline: none;
      text-decoration: none;
      -ms-interpolation-mode: bicubic;
    }

    a { color: #B8973A; }

    /* Mobile responsive */
    @media only screen and (max-width: 620px) {
      .email-wrapper { padding: 8px !important; }
      .email-container { width: 100% !important; }
      .email-body { padding: 20px 16px !important; }
      .btn-primary, .btn-secondary, .btn-danger {
        display: block !important;
        width: 90% !important;
        margin: 8px auto !important;
        text-align: center !important;
      }
      .stats-table td { display: block !important; width: 100% !important; }
    }
  </style>
</head>
<body style="margin:0; padding:0; background-color:#f0f2f7;">

  <!-- Outer wrapper table -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
         class="email-wrapper"
         style="background-color:#f0f2f7; padding:28px 16px;">
    <tr>
      <td align="center">

        <!-- Main container — max 600px -->
        <table role="presentation" class="email-container" cellpadding="0" cellspacing="0"
               style="max-width:600px; width:100%; border-radius:10px; overflow:hidden;
                      box-shadow:0 2px 12px rgba(0,0,0,0.12);">

          <!-- ═══ HEADER ═══ -->
          <tr>
            <td style="background-color:#1B2B5E; padding:28px 32px; text-align:center;">
              <!-- Logo / brand text -->
              <h1 style="margin:0 0 4px;
                         color:#B8973A;
                         font-size:26px;
                         font-weight:700;
                         font-family:'Heebo',Arial,sans-serif;
                         letter-spacing:0.5px;
                         line-height:1.3;">
                ענה את השואל
              </h1>
              <p style="margin:0;
                        color:#a0aac4;
                        font-size:13px;
                        font-family:'Heebo',Arial,sans-serif;">
                פלטפורמת שאלות ותשובות הלכתיות — המרכז למורשת מרן
              </p>
            </td>
          </tr>

          <!-- ═══ TITLE BAR ═══ -->
          <tr>
            <td style="background-color:#B8973A; padding:14px 32px; text-align:center;">
              <h2 style="margin:0;
                         color:#1B2B5E;
                         font-size:18px;
                         font-weight:700;
                         font-family:'Heebo',Arial,sans-serif;
                         line-height:1.3;">
                {{TITLE}}
              </h2>
            </td>
          </tr>

          <!-- ═══ BODY CONTENT ═══ -->
          <tr>
            <td class="email-body"
                style="background-color:#ffffff;
                       padding:32px 36px;
                       font-size:15px;
                       line-height:1.75;
                       color:#2d2d2d;
                       font-family:'Heebo',Arial,sans-serif;
                       direction:rtl;
                       text-align:right;">
              {{BODY_CONTENT}}
            </td>
          </tr>

          <!-- ═══ FOOTER ═══ -->
          <tr>
            <td style="background-color:#1B2B5E;
                       padding:20px 32px;
                       text-align:center;
                       border-radius:0 0 10px 10px;">
              <p style="margin:0 0 6px;
                        color:#8899bb;
                        font-size:12px;
                        font-family:'Heebo',Arial,sans-serif;
                        line-height:1.6;">
                הודעה זו נשלחה ממערכת "ענה את השואל" — המרכז למורשת מרן
              </p>
              <p style="margin:0;
                        color:#6677aa;
                        font-size:11px;
                        font-family:'Heebo',Arial,sans-serif;
                        line-height:1.5;">
                לשינוי העדפות התראות, פנה למנהל המערכת
              </p>
            </td>
          </tr>

        </table>
        <!-- /container -->

      </td>
    </tr>
  </table>
  <!-- /outer wrapper -->

</body>
</html>
