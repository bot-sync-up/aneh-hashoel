version: '3.9'

networks:
  aneh-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  certbot_certs:
  certbot_www:

services:

  # ─────────────────────────────────────────
  #  PostgreSQL 16
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aneh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-aneh_hashoel}
      POSTGRES_USER: ${DB_USER:-aneh_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aneh-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aneh_user} -d ${DB_NAME:-aneh_hashoel}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────
  #  Redis 7
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aneh-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - aneh-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────
  #  Backend — Node.js / Express
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: aneh-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - uploads_data:/app/uploads
    networks:
      - aneh-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────
  #  Frontend — React + Nginx (internal)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_WS_URL: ${VITE_WS_URL:-}
    container_name: aneh-frontend
    restart: unless-stopped
    networks:
      - aneh-net
    depends_on:
      - backend

  # ─────────────────────────────────────────
  #  Nginx — SSL reverse proxy (80 + 443)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: aneh-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - aneh-net
    depends_on:
      - frontend
      - backend

  # ─────────────────────────────────────────
  #  Certbot — SSL certificate (Let's Encrypt)
  # ─────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: aneh-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Auto-renew every 12 hours
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $$!; done'
    networks:
      - aneh-net
