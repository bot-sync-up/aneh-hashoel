<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Language" content="he" />
    <meta name="description" content="ענה את השואל — פלטפורמת שאלות ותשובות לרבנים" />
    <meta name="theme-color" content="#1B2B5E" />
    <meta property="og:title" content="ענה את השואל" />
    <meta property="og:description" content="פלטפורמת שאלות ותשובות לרבנים" />
    <meta property="og:locale" content="he_IL" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>ענה את השואל</title>

    <script>
      // Apply saved theme before React mounts to avoid flash
      (function () {
        try {
          var theme = localStorage.getItem('theme');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Firebase Messaging Service Worker — registered only when Firebase is configured
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/firebase-messaging-sw.js', { type: 'classic' })
            .catch(function () {
              // Silently ignore if Firebase is not configured
            });
        });
      }
    </script>
  </body>
</html>
